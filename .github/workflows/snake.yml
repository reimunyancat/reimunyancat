name: Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: reimunyancat
          outputs: |
            dist/github-snake.svg?color_snake=#FF2D7E&color_dots=#161b22,#3BD6FF,#7c4dff,#FF2D7E,#ffffff
            dist/github-snake-dark.svg?color_snake=#FF2D7E&color_dots=#161b22,#3BD6FF,#7c4dff,#FF2D7E,#ffffff
            dist/github-snake-green.svg?color_snake=#FF2D7E&color_dots=#161b22,#3BD6FF,#7c4dff,#FF2D7E,#ffffff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: $ secrets.GITHUB_TOKEN 
